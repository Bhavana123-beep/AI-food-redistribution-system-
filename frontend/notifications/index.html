<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notifications - AI Food Rescue</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <!-- Mobile Header -->
    <header class="mobile-header">
        <div class="header-left">
            <a href="../index.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i></a>
            <h2>Notifications</h2>
        </div>
        <div class="header-right">
            <button class="icon-btn" id="markAllReadBtn" title="Mark all as read">
                <i class="fa-solid fa-check-double"></i>
            </button>
        </div>
    </header>

    <!-- Main Content Container -->
    <div class="notifications-container">

        <!-- Filter Tabs -->
        <div class="filter-tabs">
            <button class="tab-btn active" data-filter="all">All</button>
            <button class="tab-btn" data-filter="unread">Unread <span class="badge"
                    id="unreadCountBadge">2</span></button>
            <button class="tab-btn" data-filter="matches">Matches</button>
            <button class="tab-btn" data-filter="deliveries">Deliveries</button>
        </div>

        <!-- Notification List -->
        <div class="notifications-list" id="notificationsList">

            <!-- Dynamic Notifications Populated by JS -->

        </div>

        <!-- Empty State (Hidden initially) -->
        <div class="empty-state" id="emptyState" style="display: none;">
            <div class="empty-icon"><i class="fa-regular fa-bell-slash"></i></div>
            <h3>No notifications here</h3>
            <p>We'll let you know when there's an update on your food redistribution activity.</p>
        </div>

    </div>

    <!-- Scripts -->
    <script src="script.js"></script>
    <script type="module" src="../firebase-init.js"></script>
</body>

</html>
